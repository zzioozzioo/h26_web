<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        let data = 10
        data || alert(`data: ${data}`) // OR 연산 -> data가 true이면 alert 실행 안함
        data && alert(`data: ${data}`) // AND 연산 -> data가 true이면 alert 실행

        let number = 22
        number = number || 0 // number에 값이 없으면 0을 할당
    
        console.log(`number: ${number}`) // undefined

        document.write('<h1>첫번째</h1>');
        console.log('나도 남긴다...');
        let num = 10;
        num = 20;
        console.log(num, typeof num);

        num = 14
        msg = '홀수'
        if(num % 2 == 0){
            msg = '짝수'
        }
        console.log('num = ' + num + ' ' + msg + '다')
        console.log(`num = ${num} ${msg}다`)
        console.log(5 == '5')
        console.log(5 === '5') // 타입 비교

        num = 15
        msg = '홀수'
        if(num % 2 == 0){
            msg = '짝수'
        }
        console.log('num = ' + num + ' ' + msg + '다');
    </script>
</head>
<body>
    <h2>hello</h2>
    <script>
        document.write('<h3>세번째</h3>');  
    </script>
</body>
</html>
