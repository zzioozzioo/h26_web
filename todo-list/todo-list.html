<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="todoStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="todoScript.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 600px;">
        <h2 class="text-center mb-4 fw-bold text-primary">Todo List</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="mb-3">
                    <label for="todoInput" class="form-label fw-semibold">할 일 내용</label>
                    <input type="text" id="todoInput" class="form-control" placeholder="할 일을 입력하세요">
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-4">
                        <label for="category" class="form-label fw-semibold">카테고리</label>
                        <select id="category" class="form-select">
                            <option value="공부">공부</option>
                            <option value="과제">과제</option>
                            <option value="운동">운동</option>
                            <option value="취미">취미</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>

                    <div class="col-4">
                        <label for="priority" class="form-label fw-semibold">우선순위</label>
                        <select id="priority" class="form-select">
                            <option value="높음">높음</option>
                            <option value="보통" selected>보통</option>
                            <option value="낮음">낮음</option>
                        </select>
                    </div>

                    <div class="col-4">
                        <label for="dueDate" class="form-label fw-semibold">마감일</label>
                        <input type="date" id="dueDate" class="form-control">
                    </div>

                    

                </div>

                <button id="addBtn" class="btn btn-primary w-100 fw-bold py-2">할 일 추가</button>
            </div>
        </div>

        

        <div class="row g-2 mb-4">
            <!-- 검색창 (8칸 차지) -->
            <div class="col-8">
                <div class="input-group">
                    <input type="text" id="searchKeyword" class="form-control" placeholder="할 일 검색하기" oninput="handleSearch()">
                    <button class="input-group-text bg-white text-secondary" type="button" onclick="handleSearch()">⌕</button>
                </div>
            </div>
            <!-- 정렬 방식 선택 (4칸 차지) -->
            <div class="col-4">
                <select id="sortType" class="form-select fw-semibold text-secondary" onchange="renderTodos()">
                    <option value="latest" selected>최신순</option>
                    <option value="alphabet">가나다순</option>
                    <option value="dueDate">마감일순</option>
                </select>
            </div>
        </div>

        <ul class="nav nav-pills justify-content-center mb-4" id="filterTab">
            <li class="nav-item">
                <button class="nav-link active fw-bold" onclick="changeFilter('all', this)">전체</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold text-secondary" onclick="changeFilter('active', this)">진행 중</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold text-secondary" onclick="changeFilter('completed', this)">완료</button>
            </li>
        </ul>

        <div id="todolist"></div>
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
